<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zilvantis</title>
    <meta name="description" content="Zilvantis — Полная защита данных, абсолютная анонимность и свободный доступ в интернет. Высокая скорость, надежное шифрование, поддержка 24/7.">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='25' y='30' width='10' height='40' rx='3' fill='%239b59b6' stroke='white' stroke-width='2'/%3E%3Crect x='45' y='15' width='10' height='70' rx='3' fill='%239b59b6' stroke='white' stroke-width='2'/%3E%3Crect x='65' y='30' width='10' height='40' rx='3' fill='%239b59b6' stroke='white' stroke-width='2'/%3E%3C/svg%3E">
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='25' y='30' width='10' height='40' rx='3' fill='%239b59b6' stroke='white' stroke-width='2'/%3E%3Crect x='45' y='15' width='10' height='70' rx='3' fill='%239b59b6' stroke='white' stroke-width='2'/%3E%3Crect x='65' y='30' width='10' height='40' rx='3' fill='%239b59b6' stroke='white' stroke-width='2'/%3E%3C/svg%3E">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #b87cf0 0%, #9b59b6 50%, #d496f0 100%);
            position: relative;
            overflow-x: hidden;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        .snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .snow-particle {
            position: absolute;
            top: -10px;
            background: white;
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }

        .bg-logo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            opacity: 0.2;
            pointer-events: none;
            z-index: 1;
        }

        .bg-logo svg {
            width: 100%;
            height: 100%;
        }

        .content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            text-align: center;
        }

        .main-text {
            color: white;
            font-weight: 900;
            font-size: clamp(32px, 8vw, 64px);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .sub-text {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 700;
            font-size: clamp(20px, 5vw, 36px);
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

    <div class="snow" id="snowContainer"></div>

    <div class="bg-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <rect x="25" y="30" width="10" height="40" rx="3" fill="%239b59b6" stroke="white" stroke-width="2.5"/>
            <rect x="45" y="15" width="10" height="70" rx="3" fill="%239b59b6" stroke="white" stroke-width="2.5"/>
            <rect x="65" y="30" width="10" height="40" rx="3" fill="%239b59b6" stroke="white" stroke-width="2.5"/>
        </svg>
    </div>

    <div class="content">
        <div class="main-text">САЙТ НА ТЕХ РАБОТАХ</div>
        <div class="sub-text">20.04.2026</div>
    </div>

    <script>
        const snowContainer = document.getElementById('snowContainer');
        
        for (let i = 0; i < 80; i++) {
            const particle = document.createElement('div');
            particle.className = 'snow-particle';
            
            const size = 4 + Math.random() * 12;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            
            particle.style.left = Math.random() * 100 + '%';
            
            const duration = 4 + Math.random() * 12;
            particle.style.animationDuration = duration + 's';
            
            particle.style.animationDelay = Math.random() * 15 + 's';
            
            const blurAmount = 3 + Math.random() * 5;
            particle.style.filter = `blur(${blurAmount}px)`;
            
            particle.style.opacity = 0.2 + Math.random() * 0.5;
            
            snowContainer.appendChild(particle);
        }
    </script>
</body>
</html>
